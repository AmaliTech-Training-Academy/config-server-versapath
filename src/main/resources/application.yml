server:
  port: ${SERVER_PORT}

spring:
  application:
    name: config-server
  cloud:
    config:
      server:
        git:
          uri: ${CONFIG_SERVER_GIT_URL}
          clone-on-start: true
          default-label: main

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_URL}
